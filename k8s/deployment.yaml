# =============================================================================
# Kubernetes Deployment - Rock Paper Scissors Game
# Deploys the Nginx container serving the static game files
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rockpaperscissor-deployment
  namespace: ns-rockpaperscissor
  labels:
    app: rockpaperscissor
    environment: production
    managed-by: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rockpaperscissor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rockpaperscissor
        environment: production
    spec:
      containers:
        - name: rockpaperscissor
          image: mokadir/rockpaperscissor:1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
      restartPolicy: Always
