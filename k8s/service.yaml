# =============================================================================
# Kubernetes Service - Rock Paper Scissors Game
# NodePort service exposing the game on port 30020
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: rockpaperscissor-service
  namespace: ns-rockpaperscissor
  labels:
    app: rockpaperscissor
    environment: production
    managed-by: jenkins
spec:
  type: NodePort
  selector:
    app: rockpaperscissor
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30020